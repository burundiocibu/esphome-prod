substitutions:
  me:   gate-ap-power

esphome:
  name: ${me}

esp32:
  board: seeed_xiao_esp32c6
  framework:
    type: esp-idf

# Enable logging
logger:

api:
  encryption:
    key: !secret esp_api_key

ota:
  - platform: esphome
    password: !secret esp_ota_pw
    id: my_ota

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

prometheus:
    
web_server:

i2c:
  scl: 1
  sda: 2
  
sensor:
  - platform: uptime
    name: ${me} uptime
    update_interval: 120s

  - platform: ina3221
    address: 0x40
    channel_1:
      shunt_resistance: 0.1 ohm
      current:
        name: "INA3221 Channel 1 Current"
      power:
        name: "INA3221 Channel 1 Power"
      bus_voltage:
        name: "INA3221 Channel 1 Bus Voltage"
      shunt_voltage:
        name: "INA3221 Channel 1 Shunt Voltage"
    channel_2:
      # ...
    channel_3:
      # ...
    update_interval: 60s


  
    