substitutions:
  me:   gate-ap-power

esphome:
  name: ${me}

esp32:
  board: seeed_xiao_esp32c6
  framework:
    type: esp-idf

# Enable logging
logger:

api:
  encryption:
    key: !secret esp_api_key

ota:
  - platform: esphome
    password: !secret esp_ota_pw
    id: my_ota

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

prometheus:
    
web_server:
  version: 3

i2c:
  scl: 23 # green
  sda: 22 # blue
  
sensor:
  - platform: uptime
    name: ${me} uptime
    update_interval: 120s

  - platform: ina3221
    address: 0x40
    channel_1:
      shunt_resistance: 0.1 ohm
      current:
        name: "Battery Current"
      power:
        name: "Battery Power"
      bus_voltage:
        name: "Battery Bus Voltage"
      shunt_voltage:
        name: "Battery Shunt Voltage"
    channel_2:
      shunt_resistance: 0.1 ohm
      current:
        name: "Solar Current"
      power:
        name: "Solar Power"
      bus_voltage:
        name: "Solar Bus Voltage"
      shunt_voltage:
        name: "Solar Shunt Voltage"
    update_interval: 30s


  
    