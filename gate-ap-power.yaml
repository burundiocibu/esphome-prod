substitutions:
  me:   gate-ap-power

esphome:
  name: ${me}

esp32:
  board: seeed_xiao_esp32c6
  framework:
    type: esp-idf

logger:
  level: INFO

api:
  encryption:
    key: !secret esp_api_key

ota:
  - platform: esphome
    password: !secret esp_ota_pw
    id: my_ota

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

prometheus:
    
web_server:
  version: 3

uart:
  - id: uart_modbus_client
    tx_pin: 18 # blue
    rx_pin: 20 # white
    baud_rate: 9600

modbus:
  send_wait_time: 50ms

modbus_controller:
  - id: renogy
    address: 1 # 0xFF
    setup_priority: -10
    update_interval: 3s
 
sensor:
  - platform: uptime
    name: ${me} uptime
    update_interval: 120s

  - platform: wifi_signal
    name: wifi signal
    update_interval: 120s

  #region battery

  - id: battery_soc
    name: Battery State of Charge
    platform: modbus_controller
    modbus_controller_id: renogy
    address: 0x0100
    unit_of_measurement: '%'
    register_type: holding
    value_type: U_WORD
    accuracy_decimals: 0

  - id: battery_voltage
    name: Battery Voltage
    platform: modbus_controller
    modbus_controller_id: renogy
    address: 0x0101
    unit_of_measurement: V
    register_type: holding
    value_type: U_WORD
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - id: battery_current
    name: Battery Current
    platform: modbus_controller
    modbus_controller_id: renogy
    address: 0x0102
    unit_of_measurement: A
    register_type: holding
    value_type: U_WORD
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
      
  - id: controller_temperature
    name: Controller Temperature
    platform: modbus_controller
    modbus_controller_id: renogy
    address: 0x0103
    bitmask: 0xFF00
    unit_of_measurement: '°C'
    register_type: holding
    value_type: S_WORD
    accuracy_decimals: 1

  - id: load_voltage
    name: Load Voltage
    platform: modbus_controller
    modbus_controller_id: renogy
    address: 0x0104
    unit_of_measurement: V
    register_type: holding
    value_type: U_WORD
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - id: load_current
    name: Load Current
    platform: modbus_controller
    modbus_controller_id: renogy
    address: 0x0105
    unit_of_measurement: A
    register_type: holding
    value_type: U_WORD
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - id: load_power
    name: Load Power
    platform: modbus_controller
    modbus_controller_id: renogy
    address: 0x0106
    unit_of_measurement: W
    register_type: holding
    value_type: U_WORD
    accuracy_decimals: 1

  - id: solar_voltage
    name: Solar Voltage
    platform: modbus_controller
    modbus_controller_id: renogy
    address: 0x0107
    unit_of_measurement: V
    register_type: holding
    value_type: U_WORD
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - id: solar_current
    name: Solar Current
    platform: modbus_controller
    modbus_controller_id: renogy
    address: 0x0108
    unit_of_measurement: A
    register_type: holding
    value_type: U_WORD
    accuracy_decimals: 2
    filters:
      - multiply: 0.1

  - id: solar_power
    name: Solar Power
    platform: modbus_controller
    modbus_controller_id: renogy
    address: 0x0109
    unit_of_measurement: W
    register_type: holding
    value_type: U_WORD
    accuracy_decimals: 1

  - id: charging_state
    name: charging_state
    entity_category: diagnostic
    internal: true
    platform: modbus_controller
    modbus_controller_id: renogy
    address: 0x0120
    bitmask: 0x00FF
    register_type: holding
    value_type: U_WORD
    accuracy_decimals: 0
    on_value:
      then:
        - component.update: charging_state_txt

  - id: error_state
    name: error_state
    entity_category: diagnostic
    internal: true
    platform: modbus_controller
    modbus_controller_id: renogy
    address: 0x0121
    register_type: holding
    value_type: U_WORD
    accuracy_decimals: 0
    on_value:
      then:
        - component.update: error_state_txt

switch:
  - id: light
    name: Light
    platform: modbus_controller
    modbus_controller_id: renogy
    address: 0x010A
    register_type: holding
    bitmask: 1

text_sensor:
  - id: charging_state_txt
    name: Charging State
    platform: template
    icon: mdi:battery-charging
    lambda: |-
      auto current_state = (int)id(charging_state).state;
      if (current_state == 0) return {"Not Charging"};
      if (current_state == 1) return {"Charging"};
      if (current_state == 2) return {"Power Point Tracking"};
      if (current_state == 3) return {"Equalizing"};
      if (current_state == 4) return {"Boosting"};
      if (current_state == 5) return {"Floating"};
      if (current_state == 6) return {"Overpower"};
      return {"Unknown"};

  - id: error_state_txt
    name: Error State
    entity_category: diagnostic
    platform: template
    icon: mdi:alert
    lambda: |-
      auto current_state = (int)id(error_state).state;
      if (current_state == 0) return {"Normal"};
      if (current_state == 1) return {"Battery Over-Discharge"};
      if (current_state == 2) return {"Battery Over-Voltage"};
      if (current_state == 4) return {"Battery Under-Voltage"};
      if (current_state == 8) return {"Load Short Circuit"};
      if (current_state == 16) return {"Load Over-Power/Over-Current"};
      if (current_state == 32) return {"Controller Over-Temperature"};
      if (current_state == 64) return {"Ambient Over-Temperature"};
      if (current_state == 128) return {"Solar Over-Power"};
      if (current_state == 256) return {"Solar Short Circuit"};
      if (current_state == 512) return {"Solar Over-Voltage"};
      if (current_state == 1024) return {"Solar Counter Current"};
      if (current_state == 2048) return {"Solar Working Point Over-Voltage"};
      if (current_state == 4096) return {"Solar Reverse Connection"};
      if (current_state == 8192) return {"Anti-Reverse MOS Short Circuit"};
      if (current_state == 16384) return {"Charge MOS Short Circuit"};
      return {"Unknown"};  
    