substitutions:
  me:   gate-ap-power

esphome:
  name: ${me}

esp32:
  board: seeed_xiao_esp32c6
  framework:
    type: esp-idf

# Enable logging
logger:

api:
  encryption:
    key: !secret esp_api_key

ota:
  - platform: esphome
    password: !secret esp_ota_pw
    id: my_ota

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

prometheus:
    
web_server:

sensor:
  - platform: uptime
    name: ${me} uptime
    update_interval: 120s


  
    