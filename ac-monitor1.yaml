substitutions:
  me: ac-monitor1

esphome:
  name: ${me}
  friendly_name: ${me}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  level: info

api:
  encryption:
    key: !secret esp_api_key

ota:
  - platform: esphome
    password: !secret esp_ota_pw
    id: my_ota

web_server:
  port: 80

prometheus:

text_sensor:
  - platform: version
    name: ${me} ESPHome Version

switch:
  - platform: restart
    name: ${me} restart

i2c:
  - id: bus_evaporator
    sda: 33 # brn
    scl: 32 # wht
    scan: true
  - id: bus_return
    sda: 14 # brn
    scl: 27 # wht
    scan: true

sensor:
  - platform: uptime
    name: ${me} uptime
    update_interval: 120s
    
  - platform: wifi_signal
    name: wifi signal
    update_interval: 120s
    
  - platform: bme280_i2c
    address: 0x76
    update_interval: 5s
    iir_filter: 16x
    i2c_id: bus_return
    temperature:
      name: ${me} return temperature
      id: tr
      accuracy_decimals: 2
      filters:
        - median
        - offset: -2.60
    pressure:
      name: ${me} return pressure
      id: pr
      accuracy_decimals: 4
      filters:
        - median
        - offset: -1.03
    humidity:
      name: ${me} return humidity
      id: hr
      accuracy_decimals: 1
      filters:
        - median

  - platform: bme280_i2c
    address: 0x76
    update_interval: 5s
    iir_filter: 16x
    i2c_id: bus_evaporator
    temperature:
      name: ${me} evaporator temperature
      id: te
      accuracy_decimals: 2
      filters:
        - median
    pressure:
      name: ${me} evaporator pressure
      id: pe
      accuracy_decimals: 4
      filters:
        - median
    humidity:
      name: ${me} evaporator humidity
      id: he
      accuracy_decimals: 1
      filters:
        - median

  - platform: template
    name: ${me} return dewpoint
    unit_of_measurement: °C
    lambda: return (243.5*(log(id(hr).state/100)+((17.67*id(tr).state)/(243.5+id(tr).state)))/(17.67-log(id(hr).state/100)-((17.67*id(tr).state)/(243.5+id(tr).state))));
    id: td1
    accuracy_decimals: 1

  - platform: template
    name: ${me} evaporator dewpoint
    unit_of_measurement: °C
    lambda: return (243.5*(log(id(he).state/100)+((17.67*id(te).state)/(243.5+id(te).state)))/(17.67-log(id(he).state/100)-((17.67*id(te).state)/(243.5+id(te).state))));
    id: td2
    accuracy_decimals: 1

  - platform: template
    name: ${me} Tr-Te
    lambda: return id(tr).state - id(te).state;
    accuracy_decimals: 2
    unit_of_measurement: °C

  - platform: template
    name: ${me} Pr-Pe
    lambda: return id(pr).state - id(pe).state;
    unit_of_measurement: hPa
    accuracy_decimals: 2

  - platform: template
    name: ${me} return absolute humidity
    lambda: |-
      const float mw = 18.01534;    // molar mass of water g/mol
      const float r = 8.31447215;   // Universal gas constant J/mol/K
      return (6.112 * powf(2.718281828, (17.67 * id(tr).state) /
        (id(tr).state + 243.5)) * id(pr).state * mw) /
        ((273.15 + id(tr).state) * r); // in grams/m^3
    accuracy_decimals: 2
    update_interval: 15s
    icon: 'mdi:water'
    unit_of_measurement: 'g/㎥'

  - platform: template
    name: ${me} evaporator absolute humidity
    lambda: |-
      const float mw = 18.01534;    // molar mass of water g/mol
      const float r = 8.31447215;   // Universal gas constant J/mol/K
      return (6.112 * powf(2.718281828, (17.67 * id(tr).state) /
        (id(te).state + 243.5)) * id(pe).state * mw) /
        ((273.15 + id(te).state) * r); // in grams/m^3
    accuracy_decimals: 2
    update_interval: 15s
    icon: 'mdi:water'
    unit_of_measurement: 'g/㎥'
