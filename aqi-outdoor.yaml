substitutions:
  me: "aqi-outdoor"
  meid: "outdoor"

esphome:
  name: ${me}
  comment: supermini esp32h2

esp32:
  variant: ESP32H2
  framework:
    type: esp-idf


network:
  enable_ipv6: true

openthread:
  device_type: FTD
  force_dataset: True
  output_power: 20dBm
  tlv: 0e080000000000010000000300000f4a0300001535060004001fffe00208d048b6c2bb035b310708fdc224ebeb1bd67f051031ef9e2d3d6fe3acff931e9e82bb14d2030e68612d7468726561642d313631620102161b0410625716294324d7a2013e2100d549ff0e0c0402a0f7f8

logger:
  level: info

api:
  encryption:
    key: !secret esp_api_key

ota:
  - platform: esphome
    password: !secret esp_ota_pw
    id: my_ota

web_server:
  port: 80

prometheus:

external_components:
  - source:
      type: local
      path: components
    components: [openthread_rssi]

openthread_rssi:
  update_interval: 5s

text_sensor:
  - platform: version
    name: ${me} ESPHome Version

switch:
  - platform: restart
    name: ${me} restart

i2c:
  sda: GPIO13 # green & white
  scl: GPIO11 # blue
  scan: true
  id: co2bus

sensor:
  - platform: uptime
    name: ${me} uptime
    update_interval: 120s

  - platform: scd30
    # https://sensirion.com/media/documents/4EAF6AF8/61652C3C/Sensirion_CO2_Sensors_SCD30_Datasheet.pdf
    # https://sensirion.com/media/documents/33C09C07/620638B8/Sensirion_SCD30_Field_Calibration.pdf
    i2c_id: co2bus
    temperature_offset: 0 °C
    address: 0x61
    update_interval: 2s
    co2:
      name: ${me} CO2
      accuracy_decimals: 1
      unit_of_measurement: ppm
      filters:
        - filter_out:
          - 0.0
    temperature:
      name: ${me} Temperature
      accuracy_decimals: 2
    humidity:
      name: ${me} Humidity
      accuracy_decimals: 1

  - platform: sps30
    # https://sensirion.com/media/documents/8600FF88/64A3B8D6/Sensirion_PM_Sensors_Datasheet_SPS30.pdf
    id: ${meid}_sps30
    address: 0x69
    update_interval: 10s
    pm_1_0:
      name: ${me} PM <1µm µg/m³
      id: ${meid}_PM_1_0
    pm_2_5:
      name: ${me} PM <2.5µm µg/m³
      id: ${meid}_PM_2_5
    pm_4_0:
      name: ${me} PM <4µm µg/m³
      id: ${meid}_PM_4_0
    pm_10_0:
      name: ${me} PM <10µm µg/m³
      id: ${meid}_PM_10_0
    pmc_0_5:
      name: ${me} PM <0.5µm #/cm³
      id: ${meid}_PMC_0_5
    pmc_1_0:
      name: ${me} PM <1µm #/cm³
      id: ${meid}_PMC_1_0
    pmc_2_5:
      name: ${me} PM <2.5µm #/cm³
      id: ${meid}_PMC_2_5
    pmc_4_0:
      name: ${me} PM <4µm #/cm³
      id: ${meid}_PMC_4_0
    pmc_10_0:
      name: ${me} PM <10µm #/cm³
      id: ${meid}_PMC_10_0
    pm_size:
      name: ${me} Typical Particle size
      id: ${meid}_pm_size

button:
  - platform: template
    name: ${me} Apply CO2 calibration value
    entity_category: "config"
    on_press:
      then:
        - scd30.force_recalibration_with_reference:
            value: !lambda 'return id(co2_cal).state;'

  - platform: template
    name: ${me} SPS30 Force fan clean
    entity_category: "config"
    on_press:
      then:
        - sps30.start_fan_autoclean: ${meid}_sps30

number:
  - platform: template
    name: ${me} CO2 calibration value
    optimistic: true
    min_value: 350
    max_value: 4500
    step: 1
    id: co2_cal
    icon: "mdi:molecule-co2"
    entity_category: "config"
    unit_of_measurement: ppm

