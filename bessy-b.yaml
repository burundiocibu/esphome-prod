substitutions:
  me: "bessy-b"
  meid: "bessy-b"

  # ---- pin map (matches the wiring table) ----
  pin_spi_clk:  GPIO18
  pin_spi_miso: GPIO19
  pin_spi_mosi: GPIO27
  pin_tft_cs:   GPIO4
  pin_tft_dc:   GPIO14
  pin_tft_rst:  GPIO13
  pin_tft_bl:   GPIO5
  pin_rtd_cs:   GPIO16
  pin_tc_cs:    GPIO17
  pin_i2c_sda:  GPIO21
  pin_i2c_scl:  GPIO22
  pin_analog:   GPIO34
  pin_enc_a:    GPIO35
  pin_enc_b:    GPIO39
  pin_enc_sw:   GPIO36
  pin_ctc_int:  GPIO23
  pin_ctc_rst:  GPIO12
  pin_relay1:   GPIO32
  pin_relay2:   GPIO33
  pin_relay3:   GPIO25
  pin_relay4:   GPIO26
  pin_status:   GPIO23

esphome:
  name: ${me}
  friendly_name: ${me}
  comment: esp32-relay4

esp32:
  board: esp32dev
  variant: esp32
  framework:
    type: esp-idf

logger:
  level: INFO

api:
  encryption:
    key: !secret esp_api_key

ota:
  - platform: esphome
    password: !secret esp_ota_pw
    id: my_ota

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: bessy-b Fallback Hotspot
    password: "n84gt5ei4aAb"

captive_portal:

web_server:
  port: 80
  version: 3

prometheus:

# ===================== Buses =====================
spi:
  clk_pin: ${pin_spi_clk}
  miso_pin: ${pin_spi_miso}
  mosi_pin: ${pin_spi_mosi}

i2c:
  sda: ${pin_i2c_sda}
  scl: ${pin_i2c_scl}
  scan: true

# ===================== Display =====================
output:
  - platform: ledc
    pin:
      number: ${pin_tft_bl}
      ignore_strapping_warning: true
    id: tft_backlight

light:
  - platform: monochromatic
    name: "Display Backlight"
    output: tft_backlight
    restore_mode: ALWAYS_ON

font:
  - file: "gfonts://Roboto"
    id: roboto
    size: 22

display:
  - platform: mipi_spi
    id: my_display
    model: ST7796
    rotation: 270
    cs_pin: ${pin_tft_cs}
    dc_pin: ${pin_tft_dc}
    reset_pin: ${pin_tft_rst}
    update_interval: 1s
    invert_colors: true
    lambda: |-
      auto fg = Color(0, 0, 0);        // black in buffer → white on screen (panel inverts)
      auto bg = Color(255, 255, 255);   // white in buffer → black on screen (panel inverts)
      it.fill(bg);
      it.printf(10,  10, id(roboto), fg, "RTD: %.1f C",  id(rtd_temp).state);
      it.printf(10,  44, id(roboto), fg, "TC : %.1f C",  id(tc_temp).state);
      it.printf(10,  78, id(roboto), fg, "AIN: %.3f V",  id(analog_in).state);
      it.printf(10, 124, id(roboto), fg, "A0: %.3f V",   id(ads_a0).state);
      it.printf(10, 158, id(roboto), fg, "A1: %.3f V",   id(ads_a1).state);
      it.printf(10, 192, id(roboto), fg, "A2: %.3f V",   id(ads_a2).state);
      it.printf(10, 226, id(roboto), fg, "A3: %.3f V",   id(ads_a3).state);
      if (id(touch_x) >= 0)
        it.printf(10, 260, id(roboto), fg, "Touch: %d, %d", id(touch_x), id(touch_y));
      else
        it.printf(10, 260, id(roboto), fg, "Touch: ---");

globals:
  - id: touch_x
    type: int
    initial_value: "-1"
  - id: touch_y
    type: int
    initial_value: "-1"

touchscreen:
  - platform: ft63x6
    id: my_touch
    interrupt_pin: ${pin_ctc_int}
    reset_pin:
      number: ${pin_ctc_rst}
      ignore_strapping_warning: true
    on_touch:
      - lambda: |-
          ESP_LOGI("touch", "Touch at x=%d, y=%d", touch.x, touch.y);
          id(touch_x) = touch.x;
          id(touch_y) = touch.y;
          id(my_display).update();

# ADS1115 hub (default address; ADDR->GND = 0x48)
ads1115:
  - address: 0x48


# ===================== Sensors =====================
text_sensor:
  - platform: version
    name: ${me} ESPHome Version

sensor:
  - platform: uptime
    name: ${me} uptime
    update_interval: 120s

  # MAX31865 RTD amplifier (PT100). For PT1000 use 4300 / 1000.
  - platform: max31865
    name: "RTD Temperature"
    id: rtd_temp
    cs_pin: ${pin_rtd_cs}
    reference_resistance: 430 Ω
    rtd_nominal_resistance: 100 Ω
    rtd_wires: 3
    update_interval: 5s

  # MAX31855 thermocouple (read-only on SPI; no MOSI needed)
  - platform: max31855
    name: "Thermocouple Temperature"
    id: tc_temp
    cs_pin: ${pin_tc_cs}
    update_interval: 5s

  # ADS1115 — four single-ended channels (A0..A3 referenced to GND).
  - platform: ads1115
    name: "ADS1115 A0"
    id: ads_a0
    multiplexer: A0_GND
    gain: 6.144
    update_interval: 5s
  - platform: ads1115
    name: "ADS1115 A1"
    id: ads_a1
    multiplexer: A1_GND
    gain: 6.144
    update_interval: 5s
  - platform: ads1115
    name: "ADS1115 A2"
    id: ads_a2
    multiplexer: A2_GND
    gain: 6.144
    update_interval: 5s
  - platform: ads1115
    name: "ADS1115 A3"
    id: ads_a3
    multiplexer: A3_GND
    gain: 6.144
    update_interval: 5s

  # On-chip ADC1 analog sensor
  - platform: adc
    name: "Analog Sensor"
    id: analog_in
    pin: ${pin_analog}
    attenuation: 12db
    update_interval: 5s

  # Rotary encoder — input-only pins, EXTERNAL pull-ups required (no internal)
  - platform: rotary_encoder
    name: "Encoder"
    id: encoder
    pin_a:
      number: ${pin_enc_a}
      mode:
        input: true
    pin_b:
      number: ${pin_enc_b}
      mode:
        input: true

# ===================== Inputs =====================
binary_sensor:
  - platform: gpio
    name: "Encoder Button"
    pin:
      number: ${pin_enc_sw}
      mode:
        input: true
      inverted: true

# ===================== Relays + LED =====================
switch:
  - platform: restart
    name: ${me} restart
  - platform: gpio
    name: "Fan"
    pin: ${pin_relay1}
  - platform: gpio
    name: "Auger"
    pin: ${pin_relay2}
  - platform: gpio
    name: "Igniter"
    pin: ${pin_relay3}
  - platform: gpio
    name: "Relay 4"
    pin: ${pin_relay4}

