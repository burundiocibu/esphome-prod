substitutions:
  me: "bessy-b"
  meid: "bessy-b"

esphome:
  name: ${me}
  friendly_name: ${me}
  comment: esp32-relay4

esp32:
  variant: esp32
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret esp_api_key

ota:
  - platform: esphome
    password: !secret esp_ota_pw
    id: my_ota

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: bessy-b Fallback Hotspot
    password: "n84gt5ei4aAb"

captive_portal:

web_server:
  port: 80
  version: 3

prometheus:

text_sensor:
  - platform: version
    name: ${me} ESPHome Version

switch:
  - platform: restart
    name: ${me} restart
  - platform: gpio
    pin: GPIO32
    name: "Relay 1"
  - platform: gpio
    pin: GPIO33
    name: "Relay 2"
  - platform: gpio
    pin: GPIO25
    name: "Relay 3"
  - platform: gpio
    pin: GPIO26
    name: "Relay 4"

sensor:
  - platform: uptime
    name: ${me} uptime
    update_interval: 120s

status_led:
  pin: GPIO23