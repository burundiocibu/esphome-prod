substitutions:
  me: "bessy-b"
  meid: "bessy-b"

  # ---- pin map (matches the wiring table) ----
  pin_spi_clk:  GPIO18
  pin_spi_miso: GPIO19
  pin_spi_mosi: GPIO27
  pin_tft_cs:   GPIO4
  pin_tft_dc:   GPIO14
  pin_tft_rst:  GPIO13
  pin_tft_bl:   GPIO5
  pin_rtd_cs:   GPIO16
  pin_tc_cs:    GPIO17
  pin_i2c_sda:  GPIO21
  pin_i2c_scl:  GPIO22
  pin_analog:   GPIO34
  pin_enc_a:    GPIO35
  pin_enc_b:    GPIO39
  pin_enc_sw:   GPIO36
  pin_ctc_int:  GPIO23
  pin_ctc_rst:  GPIO12
  pin_relay1:   GPIO32
  pin_relay2:   GPIO33
  pin_relay3:   GPIO25
  pin_relay4:   GPIO26
  pin_status:   GPIO23

esphome:
  name: ${me}
  friendly_name: ${me}
  comment: esp32-relay4


esp32:
  board: esp32dev
  variant: esp32
  framework:
    type: esp-idf

logger:
  level: INFO

api:
  encryption:
    key: !secret esp_api_key

ota:
  - platform: esphome
    password: !secret esp_ota_pw
    id: my_ota

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: bessy-b Fallback Hotspot
    password: "n84gt5ei4aAb"

captive_portal:

web_server:
  port: 80
  version: 3

prometheus:

# ===================== Buses =====================
spi:
  clk_pin: ${pin_spi_clk}
  miso_pin: ${pin_spi_miso}
  mosi_pin: ${pin_spi_mosi}

i2c:
  sda: ${pin_i2c_sda}
  scl: ${pin_i2c_scl}
  scan: true

# ===================== Display =====================
output:
  - platform: ledc
    pin:
      number: ${pin_tft_bl}
      ignore_strapping_warning: true
    id: tft_backlight

light:
  - platform: monochromatic
    name: "Display Backlight"
    output: tft_backlight
    restore_mode: ALWAYS_ON

font:
  - file: "gfonts://Roboto"
    id: roboto
    size: 22

display:
  - platform: mipi_spi
    id: my_display
    model: ST7796
    rotation: 90
    cs_pin: ${pin_tft_cs}
    dc_pin: ${pin_tft_dc}
    reset_pin: ${pin_tft_rst}
    update_interval: 1s
    invert_colors: true
    lambda: |-
      auto fg = Color(0, 0, 0);        // black in buffer → white on screen (panel inverts)
      auto bg = Color(255, 255, 255);   // white in buffer → black on screen (panel inverts)
      it.fill(bg);
      it.printf(10,  44, id(roboto), fg, "TC : %.1f C",  id(tc_temp).state);
      it.printf(10,  78, id(roboto), fg, "AIN: %.3f V",  id(analog_in).state);
      it.printf(10, 124, id(roboto), fg, "A0: %.3f V",   id(ads_a0).state);
      it.printf(10, 158, id(roboto), fg, "A1: %.3f V",   id(ads_a1).state);
      it.printf(10, 192, id(roboto), fg, "A2: %.3f V",   id(ads_a2).state);
      it.printf(10, 226, id(roboto), fg, "A3: %.3f V",   id(ads_a3).state);
      if (id(touch_x) >= 0)
        it.printf(10, 260, id(roboto), fg, "Touch: %d, %d", id(touch_x), id(touch_y));
      else
        it.printf(10, 260, id(roboto), fg, "Touch: ---");

globals:
  - id: touch_x
    type: int
    initial_value: "-1"
  - id: touch_y
    type: int
    initial_value: "-1"

touchscreen:
  - platform: ft63x6
    id: my_touch
    interrupt_pin: ${pin_ctc_int}
    reset_pin:
      number: ${pin_ctc_rst}
      ignore_strapping_warning: true
    on_touch:
      - lambda: |-
          ESP_LOGI("touch", "Touch at x=%d, y=%d", touch.x, touch.y);
          id(touch_x) = touch.x;
          id(touch_y) = touch.y;
          id(my_display).update();

# ADS1115 hub (default address; ADDR->GND = 0x48)
ads1115:
  - address: 0x48


# ===================== Sensors =====================
text_sensor:
  - platform: version
    name: ${me} ESPHome Version

sensor:
  - platform: uptime
    name: ${me} uptime
    update_interval: 120s

  # MAX31855 thermocouple (read-only on SPI; no MOSI needed)
  - platform: max31855
    name: "Thermocouple Temperature"
    id: tc_temp
    cs_pin: ${pin_tc_cs}
    reference_temperature:
      id: tc_ref_temp
      name: tc_ref_temp
    update_interval: 5s

  # ADS1115 — four single-ended channels (A0..A3 referenced to GND).
  # A0-A2: 100kΩ NTC thermistors via 47kΩ bias resistor (3.3V → 47kΩ → node → NTC → GND)
  - platform: ads1115
    name: "ADS1115 A0"
    id: ads_a0
    multiplexer: A0_GND
    gain: 4.096
    update_interval: 5s
  - platform: ads1115
    name: "ADS1115 A1"
    id: ads_a1
    multiplexer: A1_GND
    gain: 4.096
    update_interval: 5s
  - platform: ads1115
    name: "ADS1115 A2"
    id: ads_a2
    multiplexer: A2_GND
    gain: 4.096
    update_interval: 5s
  # A3: PT100 RTD via 3.3kΩ 0.1% bias resistor (3.3V → 3.3kΩ → node → PT100 → GND)
  # Self-heating: ~0.1-0.2mW. V range: 0.106V (25°C) to 0.199V (300°C).
  - platform: ads1115
    name: "ADS1115 A3"
    id: ads_a3
    multiplexer: A3_GND
    gain: 0.256
    update_interval: 5s

  # NTC temperature sensors — Beta equation: β=3950, R0=100kΩ @ 25°C, R_bias=47kΩ
  # T(K) = 1 / (1/298.15 + ln(R_ntc/100000) / 3950)
  - platform: template
    name: "NTC Temperature A0"
    id: ntc_temp_a0
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      float v = id(ads_a0).state;
      if (v <= 0.0f || v >= 3.2f) return NAN;
      float r = 47000.0f * v / (3.3f - v);
      return 1.0f / (1.0f / 298.15f + logf(r / 100000.0f) / 3950.0f) - 273.15f;
  - platform: template
    name: "NTC Temperature A1"
    id: ntc_temp_a1
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      float v = id(ads_a1).state;
      if (v <= 0.0f || v >= 3.2f) return NAN;
      float r = 47000.0f * v / (3.3f - v);
      return 1.0f / (1.0f / 298.15f + logf(r / 100000.0f) / 3950.0f) - 273.15f;
  - platform: template
    name: "NTC Temperature A2"
    id: ntc_temp_a2
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      float v = id(ads_a2).state;
      if (v <= 0.0f || v >= 3.2f) return NAN;
      float r = 47000.0f * v / (3.3f - v);
      return 1.0f / (1.0f / 298.15f + logf(r / 100000.0f) / 3950.0f) - 273.15f;

  # PT100 RTD temperature — Callendar-Van Dusen inverse (IEC 60751, T ≥ 0°C)
  # R_ref = 3300Ω (update to measured value for best accuracy)
  # R_PT = R_ref * V / (3.3 - V); then solve quadratic B*T² + A*T + (1 - R/R0) = 0
  - platform: template
    name: "PT100 Temperature"
    id: pt100_temp
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      float v = id(ads_a3).state;
      if (v <= 0.0f || v >= 0.255f) return NAN;
      const float r_ref = 3000.0f;
      float r = r_ref * v / (3.3f - v);
      const float A = 3.9083e-3f;
      const float B = -5.775e-7f;
      const float R0 = 100.0f;
      float disc = A * A - 4.0f * B * (1.0f - r / R0);
      if (disc < 0.0f) return NAN;
      return (-A + sqrtf(disc)) / (2.0f * B);

  # On-chip ADC1 analog sensor
  - platform: adc
    name: "Analog Sensor"
    id: analog_in
    pin: ${pin_analog}
    attenuation: 12db
    update_interval: 5s

  # Rotary encoder — input-only pins, EXTERNAL pull-ups required (no internal)
  - platform: rotary_encoder
    name: "Encoder"
    id: encoder
    restore_mode: ALWAYS_ZERO
    publish_initial_value: true
    pin_a:
      number: ${pin_enc_a}
      mode:
        input: true
    pin_b:
      number: ${pin_enc_b}
      mode:
        input: true

# ===================== Inputs =====================
binary_sensor:
  - platform: gpio
    name: "Encoder Button"
    pin:
      number: ${pin_enc_sw}
      mode:
        input: true
      inverted: true

# ===================== Relays + LED =====================
switch:
  - platform: restart
    name: ${me} restart
  - platform: gpio
    name: "Fan"
    pin: ${pin_relay1}
  - platform: gpio
    name: "Auger"
    pin: ${pin_relay2}
  - platform: gpio
    name: "Igniter"
    pin: ${pin_relay3}
  - platform: gpio
    name: "Relay 4"
    pin: ${pin_relay4}

